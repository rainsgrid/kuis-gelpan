    { kategori: "Kelvin Wave", tipe: "pg", pertanyaan: "Sifat penjalaran gelombang Kelvin adalah...", pilihan: ["A. Dispersif", "B. Non-dispersif (menjalar tanpa perubahan bentuk)", "C. Tidak stabil", "D. Hanya vertikal"], kunci_jawaban: "B. Non-dispersif (menjalar tanpa perubahan bentuk)" },
    { kategori: "Kelvin Wave", tipe: "pg", pertanyaan: "Di khatulistiwa, Equatorial Kelvin Wave terjebak karena...", pilihan: ["A. Tekanan udara tinggi", "B. Gaya Coriolis berubah tanda (f=0)", "C. Kedalaman laut sangat dangkal", "D. Efek gravitasi bulan"], kunci_jawaban: "B. Gaya Coriolis berubah tanda (f=0)" },
    { kategori: "Kelvin Wave", tipe: "pg", pertanyaan: "Kecepatan gelombang Kelvin barotropik (permukaan) dirumuskan dengan...", pilihan: ["A. √(g'h)", "B. √(gh)", "C. g/f", "D. c/L"], kunci_jawaban: "B. √(gh)" },
    { kategori: "Kelvin Wave", tipe: "esai", pertanyaan: "Jelaskan mengapa Coastal Kelvin Wave di Belahan Bumi Utara menjalar searah berlawanan jarum jam (counter-clockwise) mengelilingi sebuah basin!", kunci_jawaban: "Karena gaya Coriolis di BBU membelokkan arus ke kanan. Saat gelombang menjalar menyusuri pantai, pantai harus berada di sisi kanan penjalaran agar terjadi keseimbangan geostropik. Konfigurasi ini secara otomatis membentuk lintasan counter-clockwise." },
    { kategori: "Kelvin Wave", tipe: "esai", pertanyaan: "Apa yang dimaksud dengan Jari-jari Deformasi Rossby (Rossby Radius) dan jelaskan variabel yang mempengaruhinya!", kunci_jawaban: "L = c/f. Merupakan skala jarak horizontal di mana efek rotasi bumi (Coriolis) menjadi setara dengan efek gravitasi. Dipengaruhi oleh kecepatan fase gelombang (c) dan parameter Coriolis (f) yang nilainya berubah terhadap lintang." },
    { kategori: "Kelvin Wave", tipe: "esai", pertanyaan: "Jelaskan peran Equatorial Kelvin Wave dalam fenomena El Niño di Samudera Pasifik!", kunci_jawaban: "Adanya Westerly Wind Burst di Pasifik Barat memicu gelombang Kelvin internal yang menjalar ke Timur. Gelombang ini menurunkan kedalaman termoklin di Pasifik Timur, menghambat upwelling air dingin, dan menyebabkan suhu permukaan laut di Timur memanas (El Niño)." },
    { kategori: "Kelvin Wave", tipe: "true_false", pertanyaan: "Coastal Kelvin Wave di Belahan Bumi Selatan menjalar dengan pantai di sebelah kanan.", kunci_jawaban: "Salah", penjelasan: "Di BBS pantai berada di sebelah KIRI arah penjalaran." },
    { kategori: "Kelvin Wave", tipe: "true_false", pertanyaan: "Rossby Radius (L) berkurang nilainya jika lintang bertambah (menuju kutub).", kunci_jawaban: "Benar" },
    { kategori: "Kelvin Wave", tipe: "true_false", pertanyaan: "Gelombang Kelvin tidak memiliki komponen kecepatan yang tegak lurus pantai (v = 0).", kunci_jawaban: "Benar" },
    { kategori: "Kelvin Wave", tipe: "esai", pertanyaan: "Jelaskan mengapa gelombang Kelvin disebut sebagai gelombang yang terjebak (trapped wave)!", kunci_jawaban: "Karena amplitudonya meluruh secara eksponensial menjauhi boundary (pantai atau ekuator), sehingga energinya terkonsentrasi hanya di dekat batas tersebut." }
];

let soalAktif = [], indeksSoal = 0, jawabanUser = [];

function initMenu() {
    const container = document.getElementById('menu-container');
    container.innerHTML = ''; 
    const kategoriUnik = [...new Set(databaseSoal.map(s => s.kategori))];
    kategoriUnik.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'btn-outline';
        btn.innerText = k;
        btn.onclick = () => startQuiz(k);
        container.appendChild(btn);
    });
    document.getElementById('btn-all-topics').innerText = `Mulai Semua Topik`;
}

function startQuiz(k) {
    soalAktif = k === 'Semua Topik' ? [...databaseSoal] : databaseSoal.filter(s => s.kategori === k);
    indeksSoal = 0; 
    jawabanUser = new Array(soalAktif.length).fill(""); 
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none'; 
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('current-category-text').innerText = k;
    renderSoal();
}

function renderSoal() {
    const s = soalAktif[indeksSoal];
    document.getElementById('question-counter').innerText = `Soal ${indeksSoal + 1} / ${soalAktif.length}`;
    document.getElementById('progress-bar').style.width = `${((indeksSoal + 1) / soalAktif.length) * 100}%`;
    document.getElementById('question-text').innerText = s.pertanyaan;
    
    const container = document.getElementById('answer-container');
    container.innerHTML = '';

    if (s.tipe === 'esai') {
        const txt = document.createElement('textarea');
        txt.className = 'essay-input';
        txt.placeholder = "Ketik jawaban analisis Anda...";
        txt.value = jawabanUser[indeksSoal];
        txt.oninput = (e) => { jawabanUser[indeksSoal] = e.target.value; };
        container.appendChild(txt);
    } else {
        const div = document.createElement('div'); div.className = 'options-list';
        const pilihanTampil = s.tipe === 'true_false' ? ["Benar", "Salah"] : s.pilihan;
        
        pilihanTampil.forEach(o => {
            const lbl = document.createElement('label'); 
            lbl.className = 'option-item' + (jawabanUser[indeksSoal] === o ? ' selected' : '');
            lbl.innerHTML = `<input type="radio" name="opt" ${jawabanUser[indeksSoal] === o ? 'checked' : ''}> ${o}`;
            lbl.onclick = () => {
                jawabanUser[indeksSoal] = o;
                renderSoal(); 
            };
            div.appendChild(lbl);
        });
        container.appendChild(div);
    }

    document.getElementById('btn-prev').style.display = indeksSoal === 0 ? 'none' : 'block';
    document.getElementById('btn-next').style.display = indeksSoal === soalAktif.length - 1 ? 'none' : 'block';
    document.getElementById('btn-lihat-hasil').style.display = 'block'; 

    window.scrollTo(0, 0);
}

function nextQuestion() { if (indeksSoal < soalAktif.length - 1) { indeksSoal++; renderSoal(); } }
function prevQuestion() { if (indeksSoal > 0) { indeksSoal--; renderSoal(); } }

function showResults() {
    const belum = jawabanUser.filter(j => j === "").length;
    if (belum > 0) {
        if (!confirm(`Masih ada ${belum} soal belum diisi. Tetap lihat hasil?`)) return;
    }

    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    
    let skor = 0;
    const rev = document.getElementById('review-container'); rev.innerHTML = '';
    
    soalAktif.forEach((s, i) => {
        const u = jawabanUser[i];
        const displayUser = u === "" ? "<span style='color:orange'>(Belum dikerjakan)</span>" : u;
        const card = document.createElement('div'); card.className = 'review-card';
        
        let isWrong = (s.tipe === 'pg' || s.tipe === 'true_false') && u !== s.kunci_jawaban;
        if (isWrong) card.classList.add('wrong-pg');
        if ((s.tipe === 'pg' || s.tipe === 'true_false') && u === s.kunci_jawaban) skor++;

        const penjelasanText = s.penjelasan ? `<br><small><i>Ket: ${s.penjelasan}</i></small>` : "";

        card.innerHTML = `
            <div class="review-q">
                <span style="font-weight:bold">${i+1}. ${s.pertanyaan}</span>
                <span class="review-badge">${s.tipe.replace('_','/').toUpperCase()}</span>
            </div>
            <div style="font-size:12px; color:#666; margin-top:10px;">Jawaban Anda:</div>
            <div class="ans-user">${displayUser} ${isWrong && u !== "" ? '<span style="color:red; font-weight:bold"> (Salah)</span>' : ''}</div>
            <div style="font-size:12px; color:#666; margin-top:10px">Jawaban Benar:</div>
            <div class="ans-ref">${s.kunci_jawaban}${penjelasanText}</div>
        `;
        rev.appendChild(card);
    });
    
    document.getElementById('score-category-name').innerText = document.getElementById('current-category-text').innerText;
    document.getElementById('score-text-total').innerText = `${skor} / ${soalAktif.filter(x=>x.tipe !== 'esai').length}`;
    window.scrollTo(0,0);
}

initMenu();
</script>
